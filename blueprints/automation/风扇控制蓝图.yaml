blueprint:
  name: "智能温度控制风扇（带开关阈值）"
  description: |
    根据温度自动控制风扇开关和转速
    - 低于关闭温度：风扇关闭
    - 高于启动温度：风扇开启并根据温度调节转速
    - 中间区间：保持上次状态（避免频繁启停）
  domain: automation
  input:
    # 温度传感器
    temperature_sensor:
      name: 温度传感器
      description: 用于监测温度的设备
      selector:
        entity:
          domain: sensor
          device_class: temperature
          multiple: false
    
    # 风扇设备
    fan:
      name: 风扇
      description: 需要控制的风扇设备
      selector:
        entity:
          domain: fan
          multiple: false
    
    # 温度阈值
    turn_off_temp:
      name: 关闭温度（℃）
      description: 低于此温度时关闭风扇
      default: 20
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
          unit_of_measurement: "℃"
    
    turn_on_temp:
      name: 启动温度（℃）
      description: 高于此温度时开启风扇
      default: 25
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
          unit_of_measurement: "℃"
    
    # 控制模式
    control_mode:
      name: 转速控制模式
      description: 选择风扇开启后的转速控制方式
      default: "linear"
      selector:
        select:
          options:
            - label: 线性控制（平滑过渡）
              value: "linear"
            - label: 区间控制（阶梯式）
              value: "interval"
    
    # 线性控制参数
    min_speed_temp:
      name: 最低转速温度（℃）
      description: 达到此温度时风扇以最低转速运行
      default: 25
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
          unit_of_measurement: "℃"
    
    max_speed_temp:
      name: 最高转速温度（℃）
      description: 达到此温度时风扇以最高转速运行
      default: 35
      selector:
        number:
          min: 10
          max: 70
          step: 0.5
          unit_of_measurement: "℃"
    
    min_speed:
      name: 最低转速（%）
      description: 风扇开启后的最低转速百分比
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
    
    max_speed:
      name: 最高转速（%）
      description: 风扇允许的最高转速百分比
      default: 100
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
    
    # 区间控制参数
    interval_points:
      name: 区间控制点
      description: |
        温度与转速对应关系，格式：温度:转速
        每行一个，例如：
        25:20
        30:50
        35:80
        40:100
      default: 
        25: 20
        30: 50
        35: 80
        40: 100
      selector:
        object:
    
    # 高级设置
    hysteresis:
      name: 滞回值（℃）
      description: 避免在阈值附近频繁开关的温度死区
      default: 1.0
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
          unit_of_measurement: "℃"
    
    update_delay:
      name: 更新延迟（秒）
      description: 温度稳定后才执行操作
      default: 10
      selector:
        number:
          min: 0
          max: 60
          step: 1
          unit_of_measurement: "秒"
    
    # 运行条件（可选）
    enable_condition:
      name: 启用条件（可选）
      description: 满足此条件时才运行自动化
      default: []
      selector:
        condition:

# 触发器
trigger:
  - platform: state
    entity_id: !input temperature_sensor
    id: temperature_change
    for:
      seconds: !input update_delay
  - platform: homeassistant
    event: start
    id: hass_start
  - platform: state
    entity_id: !input fan
    id: fan_state_change

# 条件
condition: !input enable_condition

# 动作
action:
  # 将输入值存储为变量
  - variables:
      temp_sensor_id: !input temperature_sensor
      fan_id: !input fan
      off_temp: !input turn_off_temp
      on_temp: !input turn_on_temp
      hyst: !input hysteresis
      mode: !input control_mode
      min_temp: !input min_speed_temp
      max_temp: !input max_speed_temp
      min_spd: !input min_speed
      max_spd: !input max_speed
      points: !input interval_points
  
  # 获取当前状态
  - variables:
      current_temp: "{{ states(temp_sensor_id) | float(0) }}"
      fan_state: "{{ states(fan_id) }}"
      current_speed: "{{ state_attr(fan_id, 'percentage') | default(0) }}"
  
  # 验证温度有效
  - condition: template
    value_template: "{{ current_temp > -50 and current_temp < 150 }}"
  
  # 判断是否应该开启（使用简化的滞回逻辑：直接比较阈值）
  - variables:
      should_be_on: >
        {% if fan_state == 'on' %}
          {{ current_temp > (off_temp - hyst) }}
        {% else %}
          {{ current_temp > (on_temp + hyst) }}
        {% endif %}
  
  # 执行风扇控制
  - choose:
      # 需要开启或调整风扇
      - conditions:
          - condition: template
            value_template: "{{ should_be_on }}"
        sequence:
          # 计算目标转速
          - variables:
              target_speed: >
                {% if mode == 'linear' %}
                  {% if current_temp <= min_temp %}
                    {{ min_spd }}
                  {% elif current_temp >= max_temp %}
                    {{ max_spd }}
                  {% else %}
                    {% set ratio = (current_temp - min_temp) / (max_temp - min_temp) %}
                    {{ (min_spd + ratio * (max_spd - min_spd)) | round(0) }}
                  {% endif %}
                {% else %}
                  {% set speed = min_spd %}
                  {% for t, s in points.items() %}
                    {% if current_temp >= t | float %}
                      {% set speed = s | float %}
                    {% endif %}
                  {% endfor %}
                  {% if speed < min_spd %}
                    {{ min_spd }}
                  {% elif speed > max_spd %}
                    {{ max_spd }}
                  {% else %}
                    {{ speed | round(0) }}
                  {% endif %}
                {% endif %}
          
          # 开启或调整风扇
          - if:
              - condition: template
                value_template: "{{ fan_state != 'on' or target_speed != current_speed }}"
            then:
              - if:
                  - condition: template
                    value_template: "{{ fan_state != 'on' }}"
                then:
                  - service: fan.turn_on
                    target:
                      entity_id: !input fan
              - service: fan.set_percentage
                target:
                  entity_id: !input fan
                data:
                  percentage: "{{ target_speed }}"
              - service: system_log.write
                data:
                  message: "风扇已调节: 温度={{ current_temp }}℃, 转速={{ target_speed }}%"
                  level: info
      
      # 需要关闭风扇
      - conditions:
          - condition: template
            value_template: "{{ not should_be_on and fan_state == 'on' }}"
        sequence:
          - service: fan.turn_off
            target:
              entity_id: !input fan
          - service: system_log.write
            data:
              message: "风扇已关闭: 温度={{ current_temp }}℃"
              level: info
