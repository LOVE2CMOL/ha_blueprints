blueprint:
  name: "智能温度控制风扇（带开关阈值）"
  description: |
    根据温度自动控制风扇开关和转速
    - 低于关闭温度：风扇关闭
    - 高于启动温度：风扇开启并根据温度调节转速
    - 中间区间：保持上次状态（避免频繁启停）
  domain: automation
  input:
    temperature_sensor:
      name: 温度传感器
      selector:
        entity:
          domain: sensor
          device_class: temperature
    fan:
      name: 风扇
      selector:
        entity:
          domain: fan
    turn_off_temp:
      name: 关闭温度（℃）
      default: 20
      selector:
        number:
          min: 0
          max: 50
          step: 0.5
    turn_on_temp:
      name: 启动温度（℃）
      default: 25
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
    control_mode:
      name: 转速控制模式
      default: "linear"
      selector:
        select:
          options:
            - "线性控制"
            - "区间控制"
    min_speed_temp:
      name: 最低转速温度（℃）
      default: 25
      selector:
        number:
          min: 0
          max: 60
          step: 0.5
    max_speed_temp:
      name: 最高转速温度（℃）
      default: 35
      selector:
        number:
          min: 10
          max: 70
          step: 0.5
    min_speed:
      name: 最低转速（%）
      default: 20
      selector:
        number:
          min: 0
          max: 100
          step: 5
    max_speed:
      name: 最高转速（%）
      default: 100
      selector:
        number:
          min: 0
          max: 100
          step: 5
    interval_points:
      name: 区间控制点
      description: "格式：温度:转速，每行一个"
      default: "25:20\n30:50\n35:80\n40:100"
      selector:
        text:
          multiline: true
    hysteresis:
      name: 滞回值（℃）
      default: 1.0
      selector:
        number:
          min: 0
          max: 5
          step: 0.1
    update_delay:
      name: 更新延迟（秒）
      default: 10
      selector:
        number:
          min: 0
          max: 60
          step: 1
    enable_notify:
      name: 启用通知
      default: false
      selector:
        boolean:
    notify_device:
      name: 通知设备
      default: ""
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input temperature_sensor
    for:
      seconds: !input update_delay
  - platform: homeassistant
    event: start

condition: []

action:
  - variables:
      temp_sensor: !input temperature_sensor
      fan_entity: !input fan
      off_temp: !input turn_off_temp
      on_temp: !input turn_on_temp
      hyst: !input hysteresis
      mode: !input control_mode
      min_temp_point: !input min_speed_temp
      max_temp_point: !input max_speed_temp
      min_spd: !input min_speed
      max_spd: !input max_speed
      interval_str: !input interval_points
      send_notify: !input enable_notify
      notify_id: !input notify_device
  
  - variables:
      current_temp: "{{ states(temp_sensor) | float(0) }}"
      fan_state: "{{ states(fan_entity) }}"
      current_speed: "{{ state_attr(fan_entity, 'percentage') | default(0) }}"
  
  - variables:
      last_state: "{{ this.attributes.last_fan_state | default('off') }}"
      
      should_turn_on: >
        {% set temp = current_temp %}
        {% set off = off_temp | float %}
        {% set on = on_temp | float %}
        {% set h = hyst | float %}
        
        {% if last_state == 'off' %}
          {{ temp > (on + h) }}
        {% else %}
          {{ temp > (off - h) }}
        {% endif %}
  
  - event: set_variable
    event_data:
      name: last_fan_state
      value: "{{ 'on' if should_turn_on else 'off' }}"
  
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ should_turn_on }}"
        sequence:
          - variables:
              target_speed: >
                {% set mode_val = mode %}
                {% set temp = current_temp %}
                {% set min_s = min_spd | float %}
                {% set max_s = max_spd | float %}
                
                {% if mode_val == '线性控制' %}
                  {% set min_t = min_temp_point | float %}
                  {% set max_t = max_temp_point | float %}
                  
                  {% if temp <= min_t %}
                    {{ min_s }}
                  {% elif temp >= max_t %}
                    {{ max_s }}
                  {% else %}
                    {% set ratio = (temp - min_t) / (max_t - min_t) %}
                    {{ (min_s + ratio * (max_s - min_s)) | round(0) }}
                  {% endif %}
                  
                {% else %}
                  {% set points_dict = {} %}
                  {% for line in interval_str.split('\n') %}
                    {% if ':' in line and line.strip() %}
                      {% set parts = line.strip().split(':') %}
                      {% if parts|length >= 2 %}
                        {% set key = parts[0] | float %}
                        {% set val = parts[1] | float %}
                        {% set _ = points_dict.update({key: val}) %}
                      {% endif %}
                    {% endif %}
                  {% endfor %}
                  {% set sorted_points = points_dict.items() | sort(attribute='0') %}
                  {% set ns = namespace(speed=min_s) %}
                  
                  {% for t_point, s_point in sorted_points %}
                    {% if temp >= t_point %}
                      {% set ns.speed = s_point %}
                    {% endif %}
                  {% endfor %}
                  
                  {% if ns.speed < min_s %}
                    {{ min_s }}
                  {% elif ns.speed > max_s %}
                    {{ max_s }}
                  {% else %}
                    {{ ns.speed | round(0) }}
                  {% endif %}
                {% endif %}
          
          - if:
              - condition: template
                value_template: "{{ fan_state != 'on' }}"
            then:
              - service: fan.turn_on
                target:
                  entity_id: "{{ fan_entity }}"
              
              - if:
                  - condition: template
                    value_template: "{{ send_notify and notify_id != '' }}"
                then:
                  - service: "notify.mobile_app_{{ notify_id }}"
                    data:
                      title: "风扇已开启"
                      message: "温度 {{ current_temp }}℃"
          
          - if:
              - condition: template
                value_template: "{{ target_speed != current_speed }}"
            then:
              - service: fan.set_percentage
                target:
                  entity_id: "{{ fan_entity }}"
                data:
                  percentage: "{{ target_speed }}"
              
              - if:
                  - condition: template
                    value_template: "{{ send_notify and notify_id != '' }}"
                then:
                  - service: "notify.mobile_app_{{ notify_id }}"
                    data:
                      title: "风扇转速"
                      message: "{{ current_temp }}℃ → {{ target_speed }}%"
      
      - conditions:
          - condition: template
            value_template: "{{ not should_turn_on and fan_state == 'on' }}"
        sequence:
          - service: fan.turn_off
            target:
              entity_id: "{{ fan_entity }}"
          
          - if:
              - condition: template
                value_template: "{{ send_notify and notify_id != '' }}"
            then:
              - service: "notify.mobile_app_{{ notify_id }}"
                data:
                  title: "风扇已关闭"
                  message: "温度 {{ current_temp }}℃"
